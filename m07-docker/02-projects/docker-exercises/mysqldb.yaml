version: '3.8'
services:
  mysql:
    image: mysql
    container_name: mysql
    ports: 
      - 3306:3306
    environment:
      - MYSQL_USER=admin
      - MYSQL_PASSWORD=pass
      - MYSQL_DATABASE=project
      - MYSQL_ROOT_PASSWORD=pass
    volumes:
      - mysql-data:/var/lib/mysql

  phpmyadmin:
    image: phpmyadmin
    container_name: phpmyadmin
    ports:
      - 8088:80
    environment:
      - PMA_HOST=mysql
    depends_on:
      - mysql
volumes:
  mysql-data:
    driver: local